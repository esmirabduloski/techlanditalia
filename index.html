<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security headers (defense in depth — primary headers should be set at the edge/CDN) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(self), usb=(), accelerometer=(), gyroscope=()" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Meta per-pagina (title, description, robots, canonical, og:*, twitter:*) emessi
         nell'HTML statico da vite-react-ssg via SEOHead: nessun fallback statico qui per
         evitare tag duplicati/conflittuali (audit SEO-002). Le route non prerenderate
         (aree private) sono noindex/dietro auth e impostano il title a runtime. -->
    <meta name="google-site-verification" content="OI5SJeV2TBEb8DNnNYMe6u1FwzvPLkA9-Gc1Y41TFbU" />
    <meta name="twitter:site" content="@techlanditalia" />

    <!-- Font loaded locally via @fontsource -->

    <!-- Preload LCP image only on desktop (hero image is hidden on mobile via lg:block) -->
    <link
      rel="preload"
      as="image"
      href="/images/home_page_techland.webp"
      fetchpriority="high"
      type="image/webp"
      media="(min-width: 1024px)"
    />

    <!-- Canonical: set per-route via react-helmet (SEOHead). No static fallback to avoid every page declaring `/` as canonical. -->

    <!-- LLM/AI discovery: Markdown mirrors -->
    <link rel="alternate" type="text/markdown" title="TECHLAND (Markdown for LLMs)" href="/llms.txt" />
    <link rel="alternate" type="text/markdown" href="/index.md" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "@id": "https://techlanditalia.it/#organization",
        "name": "TECHLAND",
        "alternateName": ["TECHLAND Italia", "TechLand Italia", "Techland", "Techland Corsi", "Techland Coding"],
        "url": "https://techlanditalia.it",
        "logo": {
          "@type": "ImageObject",
          "url": "https://techlanditalia.it/logo.png",
          "width": 512,
          "height": 512
        },
        "description": "Scuola italiana di coding online per bambini e ragazzi dai 6 ai 18 anni. Corsi di Scratch, Roblox, Minecraft, Python e Unity in piccoli gruppi. Prima lezione gratuita. Sede operativa nel Veneto.",
        "foundingDate": "2026",
        "founder": {
          "@type": "Person",
          "name": "Esmir",
          "jobTitle": "Founder"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+39-350-581-3140",
          "contactType": "customer service",
          "email": "info@techlanditalia.it",
          "availableLanguage": ["Italian"]
        },
        "sameAs": [
          "https://www.facebook.com/profile.php?id=61573749912297",
          "https://www.instagram.com/techlanditalia/",
          "https://www.linkedin.com/in/techlanditalia/"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Veneto",
          "addressCountry": "IT"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Italia"
        },
        "knowsAbout": [
          "Coding per bambini",
          "Programmazione per ragazzi",
          "Scratch",
          "Roblox Studio",
          "Minecraft Education",
          "Python",
          "Unity",
          "Pensiero computazionale",
          "STEAM"
        ],
        "audience": {
          "@type": "EducationalAudience",
          "educationalRole": "student",
          "audienceType": "Bambini e ragazzi 6-18 anni"
        },
        "offers": {
          "@type": "Offer",
          "name": "Lezione di prova gratuita",
          "description": "Prima lezione di coding gratuita per bambini e ragazzi",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>

    <!-- Structured Data - WebSite with Search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://techlanditalia.it/#website",
        "name": "TECHLAND",
        "url": "https://techlanditalia.it",
        "description": "Corsi di programmazione per bambini e ragazzi",
        "inLanguage": "it-IT",
        "publisher": { "@id": "https://techlanditalia.it/#organization" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://techlanditalia.it/corsi?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>


    <!-- LocalBusiness + AggregateRating intentionally removed: reintroduce only with real aggregated reviews (e.g. Trustpilot) to comply with Google structured-data policies. -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
